
<!-- lokasi-orb.html -->
<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lokasi Orb Worldcoin Malaysia</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="lokasi-orb.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0a0f1a, #0f172a); color: white; font-family: 'Segoe UI', system-ui, sans-serif; }
    .card-bg { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid #334155; border-radius: 16px; transition: all 0.3s ease; }
    .card-bg:hover { border-color: #00ED64; transform: translateY(-4px); }
    .btn-back { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #FF00FF, cyan); padding: 8px 20px; border-radius: 40px; text-decoration: none; color: white; font-weight: bold; transition: all 0.2s; cursor: pointer; }
    .btn-back:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(0, 237, 100, 0.5); }
  </style>
</head>
<body class="p-6">
  <div class="max-w-5xl mx-auto">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-green-400 to-cyan-400 bg-clip-text text-transparent">
        <i class="fas fa-map-marker-alt text-red-400"></i> Lokasi Orb Worldcoin Malaysia
      </h1>
      <a href="https://world.org/ms-my/find-orb" class="btn-back"><i class="fas fa-search"></i> ORB</a>
    </div>

    <!-- Grid Lokasi - Diisi oleh JavaScript -->
    <div id="lokasi-container" class="grid md:grid-cols-2 gap-6"></div>

    <div class="mt-8 p-4 bg-yellow-500/10 border border-yellow-500/30 rounded-lg text-center text-yellow-300 text-sm">
      <i class="fas fa-info-circle"></i> Semua lokasi dibantu oleh Operator. Sila semak aplikasi World App untuk pengesahan terkini dan masa operasi.
    </div>

    <div class="text-center mt-8">
      <a onclick="window.location.href='index.html?menu=open'" class="btn-back"><i class="fas fa-home"></i> Kembali ke Cryptorian World My</a>
    </div>
  </div>

  <script>
    // Fungsi untuk generate HTML dari data
    function renderLokasi() {
      const container = document.getElementById('lokasi-container');
      if (!container) return;

      // Kumpulkan mengikut negeri
      const grouped = {};
      lokasiOrb.forEach(lokasi => {
        if (!grouped[lokasi.negeri]) grouped[lokasi.negeri] = [];
        grouped[lokasi.negeri].push(lokasi);
      });

      let html = '';
      for (const [negeri, lokasiList] of Object.entries(grouped)) {
        html += `
          <div class="card-bg p-5">
            <h2 class="text-xl font-bold mb-3">
              <i class="fas ${getIconByNegeri(negeri)}"></i> ${negeri}
            </h2>
            ${lokasiList.map(l => `
              <div class="mb-4 pb-3 border-b border-gray-700 last:border-0">
                <p class="text-gray-300 text-sm font-semibold">${l.nama}</p>
                <p class="text-gray-400 text-xs mt-1">${l.alamat}</p>
                <div class="flex justify-between items-center mt-2">
                  <span class="text-yellow-400 text-xs"><i class="fas fa-user"></i> Dibantu Operator</span>
                  <a href="${l.maps}" target="_blank" class="text-cyan-400 text-xs hover:underline"><i class="fas fa-map"></i> Tunjuk pada Peta</a>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }
      container.innerHTML = html;
    }

    function getIconByNegeri(negeri) {
      const icons = {
        "Sarawak": "fa-tree text-green-400",
        "Kuala Lumpur": "fa-city text-yellow-400",
        "Kelantan": "fa-umbrella-beach text-blue-400",
        "Selangor": "fa-building text-purple-400",
        "Sabah": "fa-mountain-sun text-teal-400"
      };
      return icons[negeri] || "fa-location-dot text-red-400";
    }

    // Render bila halaman siap
    window.addEventListener('DOMContentLoaded', renderLokasi);
  </script>
</body>
</html>
