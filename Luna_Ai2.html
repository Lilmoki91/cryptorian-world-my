// ================================
// 1. DECRYPT FUNCTION
// ================================
async function decryptAESGCM(combined, keyBase64) {
    if (!window.crypto || !window.crypto.subtle) {
        throw new Error('Web Crypto API tidak disokong');
    }
    
    try {
        const keyBuffer = Uint8Array.from(atob(keyBase64), c => c.charCodeAt(0));
        const key = await crypto.subtle.importKey(
            'raw', 
            keyBuffer, 
            { name: 'AES-GCM' }, 
            false, 
            ['decrypt']
        );
        
        const iv = combined.slice(0, 12);
        const encryptedData = combined.slice(12);
        
        const decrypted = await crypto.subtle.decrypt(
            { name: 'AES-GCM', iv }, 
            key, 
            encryptedData
        );
        
        return decrypted;
    } catch (error) {
        console.error('❌ Decrypt error:', error);
        throw error;
    }
}

function parseMarkdownToStyledHTML(text) {
  try {
    // Simpan kod rujukan sebelum dibersihkan
    const kodRujukan = cariKodRujukan(text);
    
    let textBersih = text

    html = html.replace(/<h2>/g, '<h2 style="font-size: 1.4em; font-weight: 700; color: #F0F0F0; margin: 18px 0 10px 0; line-height: 1.3; border-left: 4px solid #FFB347; padding-left: 10px;">');

    html = html.replace(/<a href="(.*?)">(.*?)<\/a>/g, '<a href="$1" style="color: #00FFFF; text-decoration: underline; transition: color 0.3s;" onmouseover="this.style.color=\'#FFB347\'; this.style.textDecoration=\'none\'" onmouseout="this.style.color=\'#00FFFF\'; this.style.textDecoration=\'underline\'">$2</a>');
    
    return html;
    
  } catch (err) {
    console.warn('Error:', err);
    return text;
  }
}

function scrollDown() { 
  if (chatLog) chatLog.scrollTop = chatLog.scrollHeight; 
}

function cariKodRujukan(text) {
  const kodRasmi = ['4RH0OTE', '186300'];
  let kodJumpa = [];
  
  const textTanpaURL = text.replace(/https?:\/\/[^\s]+/g, '[URL]');
  const textBersih = textTanpaURL
    .replace(/join\/\w+/g, '')
    .replace(/ref=\w+/g, '');
  
  kodRasmi.forEach(kod => {
    const regex = new RegExp(`\\b${kod}\\b`, 'g');
    if (regex.test(textBersih)) {
      kodJumpa.push(kod);
    }
  });
  
  return kodJumpa;
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    const toast = document.createElement('div');
    toast.className = 'fixed top-4 right-4 bg-gradient-to-r from-cyan-500 to-blue-500 text-white px-6 py-3 rounded-full shadow-lg z-50 animate-slide-in';
    toast.innerHTML = `
      <div class="flex items-center gap-3">
        <span class="text-xl">✅</span>
        <span class="font-medium">Kod <span class="font-mono bg-white/20 px-2 py-1 rounded">${text}</span> copied!</span>
      </div>
    `;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.animation = 'slide-out 0.3s ease forwards';
      setTimeout(() => toast.remove(), 300);
    }, 2000);
  } catch (err) {
    console.error('Gagal copy:', err);
    alert('❌ Gagal salin. Sila salin manual.');
  }
}

function addMessage(role, text, isTyping = false) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  
  let bubbleContent;
  if (isTyping) {
    bubbleContent = '<div class="typing typing-cursor"></div>';
  } else if (role === "system") {
    bubbleContent = `<div style="color: #ff4444;">⚠️ ${text}</div>`;
  } else {
    bubbleContent = parseMarkdownToStyledHTML(text);
  }
  
  div.innerHTML = `
    <div class="bubble">
      <div class="content">${bubbleContent}</div>
    </div>
  `;
  
  chatLog.appendChild(div);
  scrollDown();
  
  return isTyping ? div.querySelector('.typing') : div.querySelector('.bubble');
}

async function typeEffect(el, text, speed = 5) {
  if(!el) return;
  el.textContent = "";
  for(let i = 0; i < text.length; i++){
    el.textContent += text[i];
    scrollDown();
    await new Promise(r => setTimeout(r, speed));
  }
  if(el && el.parentElement){
    const fullHtml = parseMarkdownToStyledHTML(text);
    el.parentElement.innerHTML = fullHtml;
    scrollDown();
  }
}

async function startTypingGreeting() {
  const openingText = `# **Hai!** Saya **LUNA AI Chatbot** 🌙, *Assistant Cryptorian World My!* ✨

**Saya boleh bantu anda dengan:**
> 1️⃣ **Pendaftaran World App** kod \`4RH0OTE\`
> 2️⃣ **Setup Hata Wallet** kod: \`186300\`
> 3️⃣ **Cashout WLD ke MYR**

Ada yang boleh saya bantu hari ini? 😊`;

}

async function sendMessage() {
  const userText = userInput.value.trim();
  
  if (!userText) return;
  if (userText.length > 500) {
    addMessage("system", "⚠️ Mesej terlalu panjang! Maksimum 500 huruf sahaja.");
    userInput.value = "";
    userInput.style.border = "2px solid red";
    setTimeout(() => userInput.style.border = "", 2000);
    return;
  }
  if (userText.length < 2) {
    addMessage("system", "⚠️ Mesej terlalu pendek. Sila taip soalan anda.");
    userInput.value = "";
    return;
  }
  
  userInput.style.border = "";
  
  addMessage("user", userText);
  userInput.value = "";
  userInput.disabled = true;
  sendBtn.disabled = true;

  history.push({ 
    role: "user", 
    parts: [{ text: userText }] 
  });
  
  const loadingId = "loading-" + Date.now();
  const loadingHTML = `
    <div class="msg ai ai-loading" id="${loadingId}">
      <div class="bubble">
        <div class="loading-dots">
          <span class="dot">✨</span>
          <span class="dot">✨</span>
          <span class="dot">✨</span>
        </div>
      </div>
    </div>
  `;
  chatLog.insertAdjacentHTML('beforeend', loadingHTML);
  scrollDown();

  try {
    if (!apiKeyLoaded || !ai) {
      throw new Error('API key belum sedia. Sila tunggu sebentar.');
    }
    
    const panduan = await dapatPanduan();
    const arahan = binaPrompt(userText, panduan);
    const systemPrompt = `${PERSONA_LUNA}\n\n${arahan}`;
    
    const config = {
      generationConfig: {
        maxOutputTokens: 900,
        temperature: 0.5,
        topP: 0.8,
        topK: 40,
      }
    };

    const messages = [
      {
        role: "user",
        parts: [{ text: systemPrompt }]
      },
      ...history.slice(-20)
    ];

    const responseStream = await ai.models.generateContentStream({
      model: MODEL,
      config: config,
      contents: messages
    });

    let fullReply = '';
    for await (const chunk of responseStream) {
      if (chunk.text) {
        fullReply += chunk.text;
      }
    }

    const loadingElement = document.getElementById(loadingId);
    if (loadingElement) loadingElement.remove();
    
    const typingEl = addMessage("ai", "", true);
    await typeEffect(typingEl, fullReply, 5);

    history.push({ 
      role: "model", 
      parts: [{ text: fullReply }] 
    });

  } catch (err) {
    console.error("Ralat GenAI:", err);
    const loadingElement = document.getElementById(loadingId);
    if (loadingElement) {
      loadingElement.querySelector('.bubble').innerHTML = 
        '<div style="color: #FF6B6B;">⚠️ Ralat. Sila cuba lagi.</div>';
    }
  } finally {
    userInput.disabled = false;
    sendBtn.disabled = false;
  }
}

function setupScrollButton() {
  const scrollBtn = document.getElementById('scroll-down-btn');
  const chatLog = document.getElementById('chat-log');
  
  if (!scrollBtn || !chatLog) return;
  
  function scrollToBottom() {
    chatLog.scrollTo({
      top: chatLog.scrollHeight,
      behavior: 'smooth'
    });
  }
  
  scrollBtn.addEventListener('click', scrollToBottom);
  
  function toggleScrollButton() {
    const isScrolled = chatLog.scrollTop < (chatLog.scrollHeight - chatLog.clientHeight - 100);
    scrollBtn.style.display = isScrolled ? 'flex' : 'none';
  }
  
  toggleScrollButton();
  chatLog.addEventListener('scroll', toggleScrollButton);
  
  const observer = new MutationObserver(toggleScrollButton);
  observer.observe(chatLog, { childList: true, subtree: true });
  
  chatLog.addEventListener('scroll', function() {
    const isAtBottom = chatLog.scrollTop + chatLog.clientHeight >= chatLog.scrollHeight - 50;
    if (isAtBottom) scrollBtn.style.display = 'none';
  });
}

setTimeout(setupScrollButton, 1000);
