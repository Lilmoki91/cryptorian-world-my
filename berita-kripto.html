<script>
// ======================= TICKER (ASAL - TAK UBAH) =======================
const COINS_CONFIG = [
    { id: 'bitcoin', symbol: 'BTC', name: 'Bitcoin' },
    { id: 'ethereum', symbol: 'ETH', name: 'Ethereum' },
    { id: 'ripple', symbol: 'XRP', name: 'Ripple' },
    { id: 'solana', symbol: 'SOL', name: 'Solana' },
    { id: 'tether', symbol: 'USDT', name: 'Tether' },
    { id: 'worldcoin-wld', symbol: 'WLD', name: 'Worldcoin' }
];

let tickerPrices = {};
let tickerChanges = {};

async function fetchTickerPrices() {
    try {
        const ids = COINS_CONFIG.map(c => c.id).join(',');
        const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=myr&include_24hr_change=true`;
        const response = await fetch(url);
        const data = await response.json();
        
        COINS_CONFIG.forEach(coin => {
            if (data[coin.id]) {
                tickerPrices[coin.symbol] = data[coin.id].myr;
                tickerChanges[coin.symbol] = data[coin.id].myr_24h_change;
            }
        });
        updateTicker();
    } catch (error) {
        console.error('Ticker fetch error:', error);
    }
}

function updateTicker() {
    const tickerEl = document.getElementById('ticker');
    if (!tickerEl) return;
    let html = '';
    COINS_CONFIG.forEach(coin => {
        const price = tickerPrices[coin.symbol];
        const change = tickerChanges[coin.symbol];
        if (price == null) return;
        
        const isPositive = change >= 0;
        const changeText = (isPositive ? '+' : '') + (change?.toFixed(2) ?? '0.00') + '%';
        const arrow = isPositive ? '▲' : '▼';
        const formattedPrice = coin.symbol === 'BTC' || coin.symbol === 'ETH' ? 
            price.toLocaleString('ms-MY', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) :
            price.toFixed(2);
        
        let iconHtml = '';
        if (coin.symbol === 'BTC') iconHtml = '<i class="fab fa-bitcoin" style="font-size:13px; margin-right:4px; color:#f7931a;"></i>';
        else if (coin.symbol === 'ETH') iconHtml = '<i class="fab fa-ethereum" style="font-size:13px; margin-right:4px; color:#627eea;"></i>';
        else if (coin.symbol === 'SOL') iconHtml = '<span style="font-size:14px; margin-right:4px; color:#9945FF; font-weight:bold;">Ⓢ</span>';
        else if (coin.symbol === 'XRP') iconHtml = '<i class="fas fa-times" style="font-size:13px; margin-right:4px; color:#8a929c;"></i>';
        else if (coin.symbol === 'USDT') iconHtml = '<span style="font-size:14px; margin-right:4px; color:#00ffb9; font-weight:bold;">₮</span>';
        else if (coin.symbol === 'WLD') iconHtml = '<i class="fas fa-earth-americas" style="font-size:13px; margin-right:4px; color:silver;"></i>';
        
        html += `<span class="ticker-item">
                    ${iconHtml}<span class="ticker-symbol">${coin.symbol}</span>
                    <span class="ticker-price"> RM ${formattedPrice}</span>
                    <span class="ticker-change ${isPositive ? 'positive' : 'negative'}"> ${arrow} ${changeText}</span>
                </span>`;
    });
    tickerEl.innerHTML = html + html;
}

fetchTickerPrices();
setInterval(fetchTickerPrices, 30000);

const COIN_KEYWORDS_BM = {
    'bitcoin': 'BTC', 'btc': 'BTC',
    'ethereum': 'ETH', 'eth': 'ETH',
    'ripple': 'XRP', 'xrp': 'XRP',
    'solana': 'SOL', 'sol': 'SOL',

function getMalaysiaTime() {
    const now = new Date();
    const options = {
        timeZone: 'Asia/Kuala_Lumpur',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        hour12: true
    };
    return `Kemaskini: ${new Intl.DateTimeFormat('ms-MY', options).format(now)}`;
}

function detectCoinBM(text) {
    const lower = text.toLowerCase();
    for (const [keyword, coin] of Object.entries(COIN_KEYWORDS_BM)) {
        if (lower.includes(keyword)) {
            return coin;
        }
    }
    return 'KRIPTO';
}

function isKriptoRelated(text) {
    const lower = text.toLowerCase();
    const keywords = ['bitcoin', 'btc', 'ethereum', 'eth', 'kripto', 'crypto', 'xrp', 'ripple', 
                      'solana', 'sol', 'tether', 'usdt', 'worldcoin', 'wld', 'mata wang digital',
                      'aset digital', 'blokchain', 'blockchain'];
    return keywords.some(kw => lower.includes(kw));
}

function decodeHtmlEntity(str) {
    const txt = document.createElement('textarea');
    txt.innerHTML = str;
    return txt.value;
}

function formatRelativeTime(dateString) {
    try {
        const pub = new Date(dateString);
        const now = new Date();
        const diffMs = now - pub;
        
        if (isNaN(diffMs) || diffMs < 0) return 'Terkini';
        
        const diffMin = Math.floor(diffMs / 60000);
        if (diffMin < 1) return 'Baru sahaja';
        if (diffMin < 60) return `${diffMin} minit lepas`;
        
        const diffHr = Math.floor(diffMin / 60);
        if (diffHr < 24) return `${diffHr} jam lepas`;
        
        const diffDay = Math.floor(diffHr / 24);
        if (diffDay === 1) return 'Semalam';
        if (diffDay < 7) return `${diffDay} hari lepas`;
        
        return pub.toLocaleDateString('ms-MY');
    } catch {
        return 'Terkini';
    }
}

async function scrapeHarianMetro() {
    const news = [];

        const rssUrl = 'https://www.hmetro.com.my/rss/utama';

            });
        }
    } catch (e) {
        console.warn('Harian Metro RSS error:', e.message);
    }
    return news;
}

// ======================= SCRAPER CRYPTO BM (KHAS) =======================
async function scrapeCryptoBM() {
    const news = [];
    try {
        // Guna Google News RSS untuk berita kripto BM
        const rssUrl = 'https://news.google.com/rss/search?q=kripto+OR+bitcoin+OR+ethereum&hl=ms&gl=MY&ceid=MY:ms';
        const proxyUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(rssUrl);
        
        const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
        const data = await res.json();
        
        if (data.items) {
            data.items.forEach(item => {
                const title = decodeHtmlEntity(item.title);
                // Extract source dari title Google News (format: "Title - Source")
                let source = 'Berita Kripto';
                let cleanTitle = title;
                const match = title.match(/(.*?)\s*-\s*(.*?)$/);
                if (match) {
                    cleanTitle = match[1].trim();
                    source = match[2].trim();
                }
                
                news.push({
                    title: cleanTitle,
                    source: source,
                    link: item.link,
                    date: formatRelativeTime(item.pubDate),
                    coin: detectCoinBM(cleanTitle)
                });
            });
        }
    } catch (e) {
        console.warn('Crypto BM RSS error:', e.message);
    }
    return news;
}

// ======================= GABUNG SEMUA SUMBER =======================
async function fetchAllNews() {
    const results = await Promise.allSettled([
        scrapeHarianMetro(),
        scrapeUtusan(),
        scrapeSinarHarian(),
        scrapeBernamaRSS(),
        scrapeBeritaHarian(),
        scrapeCryptoBM()
    ]);
    
    let allNews = [];
    results.forEach(r => {
        if (r.status === 'fulfilled' && r.value.length > 0) {
            allNews = allNews.concat(r.value);
        }
    });
    
    // Buang duplicate
    const seen = new Set();
    allNews = allNews.filter(item => {
        const key = item.title.substring(0, 50);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    });
    
    // Susun ikut coin (BTC, ETH, dll)
    allNews.sort((a, b) => {
        const coinOrder = { 'BTC': 1, 'ETH': 2, 'XRP': 3, 'SOL': 4, 'USDT': 5, 'WLD': 6, 'CRYPTO': 7, 'KRIPTO': 7 };
        return (coinOrder[a.coin] || 8) - (coinOrder[b.coin] || 8);
    });
    
    return allNews;
}

function showSkeleton() {
    const container = document.getElementById('newsContainer');
    let html = '<div class="loading-skeleton">';
    for (let i = 0; i < 4; i++) {
        html += `<div class="skeleton-card">
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                </div>`;
    }
    html += '</div>';
    container.innerHTML = html;
}

function renderNews(newsArray) {
    const container = document.getElementById('newsContainer');
    
    if (!newsArray || newsArray.length === 0) {
        container.innerHTML = `
            <div class="fallback-msg" style="background:#2a1a1a; border-color:#ff4444; color:#ff8888;">
                <i class="fas fa-exclamation-triangle" style="margin-right:8px;"></i>
                Gagal memuat berita. Sila cuba lagi.
                <div class="sub" style="margin-top:12px;">
                    <button onclick="loadNews()" style="background:#ff4444; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600;">
                        <i class="fas fa-sync-alt"></i> Muat Semula
                    </button>
                </div>
            </div>
        `;
        return;
    }
    
    const limited = newsArray.slice(0, MAX_NEWS);
    let html = '<div class="news-grid">';
    
    limited.forEach((news, idx) => {
        html += `<a class="news-card" href="${news.link}" target="_blank" rel="noopener noreferrer" style="animation-delay: ${idx * 0.07}s">
                    <span class="news-link-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></span>
                    <span class="coin-badge">${news.coin}</span>
                    <div class="news-title">${news.title}</div>
                    <div class="news-meta"><span class="news-source">${news.source}</span><span class="news-date">• ${news.date}</span></div>
                </a>`;
    });
    
    html += '</div>';
    container.innerHTML = html;
}

async function loadNews() {
    const btn = document.getElementById('btnReload');
    btn.classList.add('loading');
    document.getElementById('updatedTime').innerHTML = `<span>${getMalaysiaTime()}</span>`;
    showSkeleton();
    
    try {
        const newsList = await fetchAllNews();
        renderNews(newsList);
    } catch (err) {
        console.error('News error:', err);
        document.getElementById('newsContainer').innerHTML = `
            <div class="fallback-msg" style="background:#2a1a1a; border-color:#ff4444; color:#ff8888;">
                <i class="fas fa-exclamation-triangle"></i> Ralat sambungan.
                <div class="sub" style="margin-top:12px;">
                    <button onclick="loadNews()" style="background:#ff4444; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">
                        <i class="fas fa-sync-alt"></i> Cuba Lagi
                    </button>
                </div>
            </div>
        `;
    } finally {
        btn.classList.remove('loading');
    }
}
